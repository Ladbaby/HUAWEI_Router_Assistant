name: Release

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build'
        required: true
        default: windows
        type: choice
        options:
          - windows
          - linux
          - windows,linux

jobs:
  generate-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python -c "import tomllib; f=open('pyproject.toml','rb'); d=tomllib.load(f); print(d['project']['version'])")
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Find previous tag
        id: prev
        run: |
          PREV=$(git tag --sort=-creatordate | grep -v "^${{ steps.version.outputs.version }}$" | head -1)
          if [ -z "$PREV" ]; then
            echo "No previous tag found. Using all history."
            echo "prev=ALL" >> $GITHUB_OUTPUT
          else
            echo "Previous tag: $PREV"
            echo "prev=$PREV" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${{ steps.prev.outputs.prev }}" = "ALL" ]; then
            python .github/gen_release_notes.py -v "...${{ steps.version.outputs.version }}"
          else
            python .github/gen_release_notes.py \
              -v "${{ steps.prev.outputs.prev }}...${{ steps.version.outputs.version }}"
          fi
          echo "---"
          cat release.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release.md
          retention-days: 7

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    if: contains(github.event.inputs.platforms, 'windows')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Extract version
        shell: pwsh
        run: |
          $version = (uv pip tree --prefix 2>$null);
          python -c "import tomllib; f=open('pyproject.toml','rb'); d=tomllib.load(f); print(d['project']['version'])"
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          .venv\Scripts\pyinstaller `
            --name HUAWEI_Router_Assistant `
            --onefile `
            --add-data "app/resource/images/icons/battery_over_80.ico;app/resource/images/icons/" `
            --add-data "app/resource/images/icons/battery_below_30.ico;app/resource/images/icons/" `
            --add-data "app/resource/images/logo.ico;app/resource/images/" `
            --add-data ".venv\Lib\site-packages\desktop_notifier\resources;desktop_notifier\resources" `
            --icon "app/resource/images/logo.ico" `
            --noconsole `
            main.py
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path dist\HUAWEI_Router_Assistant.exe -DestinationPath huawei-router-assistant-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: huawei-router-assistant-windows-x64.zip
          retention-days: 7

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    if: contains(github.event.inputs.platforms, 'linux')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libglx-mesa0 libegl1 \
            libxkbcommon0 \
            libxcb1 libxcomposite1 libxdamage1 libxrandr2 \
            libxss1 libxtst6 libatk1.0-0 libatk-bridge2.0-0 \
            libgtk-3-0 libglib2.0-0
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Install PyInstaller
        run: uv pip install pyinstaller
      - name: Build with PyInstaller
        run: |
          DESKTOP_NOTIFIER_RESOURCES=$(.venv/bin/python -c \
            "import desktop_notifier; print(desktop_notifier.__path__[0])")
          .venv/bin/pyinstaller \
            --name HUAWEI_Router_Assistant \
            --onefile \
            --add-data "app/resource/images/icons/battery_over_80.ico:app/resource/images/icons/" \
            --add-data "app/resource/images/icons/battery_below_30.ico:app/resource/images/icons/" \
            --add-data "app/resource/images/logo.ico:app/resource/images/" \
            --add-data "${DESKTOP_NOTIFIER_RESOURCES}/resources:desktop_notifier/resources" \
            --icon "app/resource/images/logo.ico" \
            --noconsole \
            main.py
      - name: Package
        run: |
          cd dist
          tar -czf "$GITHUB_WORKSPACE/huawei-router-assistant-linux-x64.tar.gz" HUAWEI_Router_Assistant
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: huawei-router-assistant-linux-x64.tar.gz
          retention-days: 7

  publish-release:
    name: Publish Release
    permissions:
      contents: write
    if: github.event_name == 'workflow_dispatch'
    needs: [generate-notes, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python -c "import tomllib; f=open('pyproject.toml','rb'); d=tomllib.load(f); print(d['project']['version'])")
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: 'dist-*'
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/ || echo "No build artifacts found (some platforms may have been skipped)"

      - name: Checksums
        if: success()
        working-directory: dist
        run: |
          if [ "$(ls -A . 2>/dev/null)" != "" ]; then
            find . -type f | sort | xargs sha256sum > checksums.txt
            cat checksums.txt
          else
            echo "No build artifacts to checksum."
          fi

      - name: Create tag (if not exists)
        run: |
          git tag ${{ steps.version.outputs.version }} 2>/dev/null || echo "Tag already exists"

      - name: Push tag
        run: git push origin ${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: |
            dist/*
          body_path: release-notes/release.md
